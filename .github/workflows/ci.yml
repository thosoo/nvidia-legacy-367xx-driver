name: debian-package-build
on: [push, pull_request]
jobs:
  static:
    name: static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout
        run: |
          git rev-parse --is-inside-work-tree
          test -d .git
      - name: Run static checks in Trixie
        run: |
          docker run --rm \
            -v "$PWD:/repo:rw" \
            -w /repo \
            debian:trixie \
            sh -euxc '
              apt-get update
              apt-get install -y --no-install-recommends \
                git curl python3 build-essential ripgrep make perl \
                dpkg-dev debhelper dh-dkms quilt xz-utils ca-certificates

              git config --global --add safe.directory /repo

              tests/no-390xx-leaks.sh
              tests/amd64-only.sh
              tests/no-proprietary-artifacts.sh
              tests/generated-control-drift.sh
              tests/license-367xx.sh
              tests/supported-pci-ids.sh
              tests/module-reject-collector.sh
              tests/target-series-bookworm-trixie.sh
              tests/kbuild-module-directory.sh
              tests/kernel-standard-headers.sh
              tests/kmap-types-header.sh
              tests/linux-ioctl32-compat.sh
              tests/post-build-diagnostics-status.sh
              tests/core-workqueue-drain.sh
            '
      - name: Verify clean checkout
        run: test -z "$(git status --porcelain)"
  bookworm-package:
    name: bookworm-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build on Bookworm
        run: |
          mkdir -p ci-results/bookworm
          docker run --rm \
            -v "$PWD:/repo:ro" \
            -v "$PWD/ci-results/bookworm:/out:rw" \
            debian:bookworm \
            sh /repo/tools/build-in-debian.sh bookworm /repo /out
      - name: Guard Bookworm diagnostic artifact contents
        if: always()
        run: tests/no-uploaded-proprietary-artifacts.sh ci-results/bookworm/logs
      - name: Check Bookworm exported diagnostics are readable
        if: always()
        run: |
          unreadable=$(find ci-results/bookworm/logs ci-results/bookworm/artifacts -type f ! -readable -print)
          if test -n "$unreadable"; then
            echo "Unreadable exported CI files:" >&2
            printf '%s\n' "$unreadable" >&2
            exit 1
          fi
      - name: Upload Bookworm diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-bookworm
          path: ci-results/bookworm/logs/
          if-no-files-found: error
  trixie-package:
    name: trixie-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build on Trixie
        run: |
          mkdir -p ci-results/trixie
          docker run --rm \
            -v "$PWD:/repo:ro" \
            -v "$PWD/ci-results/trixie:/out:rw" \
            debian:trixie \
            sh /repo/tools/build-in-debian.sh trixie /repo /out
      - name: Guard Trixie diagnostic artifact contents
        if: always()
        run: tests/no-uploaded-proprietary-artifacts.sh ci-results/trixie/logs
      - name: Check Trixie exported diagnostics are readable
        if: always()
        run: |
          unreadable=$(find ci-results/trixie/logs ci-results/trixie/artifacts -type f ! -readable -print)
          if test -n "$unreadable"; then
            echo "Unreadable exported CI files:" >&2
            printf '%s\n' "$unreadable" >&2
            exit 1
          fi
      - name: Upload Trixie diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-trixie
          path: ci-results/trixie/logs/
          if-no-files-found: error

  ubuntu-6.8-module:
    name: ubuntu-6.8-module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build modules against Ubuntu 24.04 GA 6.8 headers
        run: |
          mkdir -p ci-results/ubuntu-6.8
          docker run --rm \
            -v "$PWD:/repo:ro" \
            -v "$PWD/ci-results/ubuntu-6.8:/out:rw" \
            ubuntu:24.04 \
            sh -euxc '
              export DEBIAN_FRONTEND=noninteractive
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates curl git python3 build-essential ripgrep make perl \
                dpkg-dev debhelper dh-dkms quilt xz-utils kmod binutils linux-headers-generic
              /repo/tools/build-ubuntu-6.8-module.sh /repo /out
            '
      - name: Guard Ubuntu diagnostic artifact contents
        if: always()
        run: tests/no-uploaded-proprietary-artifacts.sh ci-results/ubuntu-6.8
      - name: Upload Ubuntu 6.8 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-ubuntu-6.8
          path: ci-results/ubuntu-6.8/
          if-no-files-found: error
