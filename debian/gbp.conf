[DEFAULT]
debian-branch = 367xx/main

[buildpackage]
overlay = True
export-dir = ../build-area
preexport = make -f debian/rules check-current-tarballs
create-orig = False
pristine-tar = False
compression = gz
tarball-dir = ../tarballs-nvidia-graphics-drivers/%(version)s
component = [
	'amd64',
	]
debian-tag = 367xx/debian/%(version)s
